name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        perl: ['5.42', '5.40', '5.38', '5.36', '5.34', '5.30', '5.26', '5.20', '5.18', '5.16']
    name: Testing with Perl ${{ matrix.perl }} on ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up perl
        uses: shogo82148/actions-setup-perl@v1
        with:
            perl-version: ${{ matrix.perl }}
            install-modules: Test::Pod Test::CheckManifest

      - name: Install CPAN dependencies
        run: cpanm --notest --installdeps .

      - name: Build makefile
        run: perl Makefile.PL && make && make manifest

      - env:
          RELEASE_TESTING: 1
        run: make test

      - name: Run generative tests repeatedly
        run: bin/quicktest --max-runs 200 -l t/01-functions.t

      - env:
          RELEASE_TESTING: 1
        run: make disttest
